version: '3.8'

x-clickhouse-defaults: &clickhouse-defaults
  restart: on-failure
  image: clickhouse/clickhouse-server:23.8-alpine
  tty: true
  depends_on:
    - zookeeper-1
  logging:
    options:
      max-size: 50m
      max-file: '3'
  healthcheck:
    test:
      [
        'CMD',
        'wget',
        '--spider',
        '-q',
        'localhost:8123/ping',
      ]
    interval: 30s
    timeout: 5s
    retries: 3

x-db-depend: &db-depend
  depends_on:
    clickhouse:
      condition: service_healthy

services:
  zookeeper-1:
    image: bitnami/zookeeper:3.7.1
    container_name: zookeeper-1
    hostname: zookeeper-1
    user: root
    restart: on-failure
    environment:
      ALLOW_ANONYMOUS_LOGIN: 'yes'
      ZOO_SERVER_ID: 1
      ZOO_AUTOPURGE_INTERVAL: 1
    volumes:
      - zookeeper-1:/bitnami/zookeeper

  clickhouse:
    <<: *clickhouse-defaults
    container_name: clickhouse
    hostname: clickhouse
    ports:
      - '9000:9000'
      - '8123:8123'
    volumes:
      - clickhouse:/var/lib/clickhouse/

  signoz-migrate:
    image: signoz/migrate:0.48.1
    container_name: signoz-migrate
    <<: *db-depend
    command:
      - '--dsn=tcp://clickhouse:9000'

  query-service:
    image: signoz/query-service:0.48.1
    container_name: query-service
    hostname: query-service
    restart: on-failure
    <<: *db-depend
    command:
      - '--config=/root/config/prometheus.yml'
    environment:
      ClickHouseUrl: tcp://clickhouse:9000/
      SIGNOZ_LOCAL_DB_PATH: /var/lib/signoz/signoz.db
      DASHBOARDS_PATH: /root/config/dashboards
      STORAGE: clickhouse
      GODEBUG: netdns=go
      TELEMETRY_ENABLED: 'true'
      DEPLOYMENT_TYPE: docker-standalone-amd
    volumes:
      - signoz-db:/var/lib/signoz/
    depends_on:
      clickhouse:
        condition: service_healthy
      signoz-migrate:
        condition: service_completed_successfully

  frontend:
    image: signoz/frontend:0.48.1
    container_name: signoz-frontend
    restart: on-failure
    depends_on:
      - query-service
    ports:
      - '3301:3301'
    environment:
      NGINX_CONFIG_ENVSUBST_OUTPUT_DIR: /etc/nginx/conf.d

  otel-collector:
    image: signoz/signoz-otel-collector:0.102.9
    container_name: otel-collector
    hostname: otel-collector
    restart: on-failure
    command:
      - '--config=/etc/otel-collector-config.yaml'
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - '4317:4317'
      - '4318:4318'
    depends_on:
      clickhouse:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - '${DATABASE_PORT}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: ['redis-server', '--requirepass', '${CACHE_STORAGE_PASSWORD}']
    env_file: .env
    ports:
      - '${CACHE_STORAGE_PORT}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${BUCKET_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${BUCKET_S3_ACCESS_KEY_CREDENTIAL}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET_NAME}
      "
    environment:
      MINIO_ROOT_USER: ${BUCKET_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${BUCKET_S3_ACCESS_KEY_CREDENTIAL}
      MINIO_BUCKET_NAME: ${BUCKET_S3_BUCKET_NAME}

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs
    restart: always
    env_file: .env
    ports:
      - '${FRAMEWORK_PORT}:${FRAMEWORK_PORT}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

volumes:
  zookeeper-1:
  clickhouse:
  signoz-db:
  postgres-data:
  redis-data:
  minio-data:
