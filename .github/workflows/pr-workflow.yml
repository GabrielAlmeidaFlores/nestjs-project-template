name: PR Workflow

on:
  pull_request:
    branches:
      - qa
      - develop
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 22.15.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.15.0
          cache: 'yarn'

      - name: Verify dependency integrity
        run: |
          set -o pipefail

          yarn install --frozen-lockfile --check-files 2>&1 | tee output.log

          if grep -Ei 'error' output.log; then
            echo "❌ Dependency issues (errors) found. Failing..."
            exit 1
          fi

      - name: Run build
        run: yarn build

      - name: Run lint (fail on warnings)
        run: yarn lint --max-warnings=0

      - name: Run type check
        run: yarn check

      - name: Run unit test
        run: yarn test
