name: CI/CD

on:
  push:
    branches: ['qa']
  workflow_dispatch:

env:
  WORKING_DIRECTORY: /workspace/container/docker/qa/agiliza-previ/agiliza-previ-back

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 22.15.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.15.0
          cache: 'yarn'

      - name: Verify dependency integrity
        run: |
          set -o pipefail

          yarn install --frozen-lockfile --check-files 2>&1 | tee output.log

          if grep -Ei 'error' output.log; then
            echo "❌ Dependency issues (errors) found. Failing..."
            exit 1
          fi

      - name: Run build
        run: yarn build

      - name: Run lint (fail on warnings)
        run: yarn lint --max-warnings=0

      - name: Run type check
        run: yarn check

      - name: Run unit test
        run: yarn test --passWithNoTests

  build:
    needs: verify
    runs-on: quality-assurance
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐳 Build Docker Image
        run: |
          docker build --no-cache -t ${{ vars.REGISTRY_URL }} .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Extract App Version
        run: echo "APP_VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: 🛑 SSH - Stop Old Docker Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.QA_SSH_HOST }}
          username: ${{ secrets.QA_SSH_USER }}
          key: ${{ secrets.QA_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.WORKING_DIRECTORY }}
            bash ${{ env.WORKING_DIRECTORY }}/remove.container.sh || true

      - name: ⚙️ SSH - Update Container Environment Variables
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.QA_SSH_HOST }}
          username: ${{ secrets.QA_SSH_USER }}
          key: ${{ secrets.QA_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.WORKING_DIRECTORY }}
            echo -e '${{ vars.QA_ENVS }}' > ${{ env.WORKING_DIRECTORY }}/.container.env

      - name: 🚀 SSH - Start New Docker Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.QA_SSH_HOST }}
          username: ${{ secrets.QA_SSH_USER }}
          key: ${{ secrets.QA_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.WORKING_DIRECTORY }}
            bash ${{ env.WORKING_DIRECTORY }}/start.container.sh
