<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esqueci a Senha</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        font-family: Arial, sans-serif;
        color: #1a1a1a;
      }
      .container {
        max-width: 540px;
        margin: 0 auto;
        padding: 24px;
      }
      .logo {
        text-align: center;
        margin: 32px;
        margin-bottom: 64px;
      }
      .title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 16px;
        color: #0f2033;
      }
      .content {
        font-size: 16px;
        line-height: 1.5;
        color: #161515;
      }
      .content a {
        color: #2d77b1;
        text-decoration: none;
      }
      .content a:hover {
        text-decoration: underline;
      }
      .code-box {
        margin-top: 32px;
        margin-right: auto;
        margin-left: auto;
        padding: 24px;
        text-align: center;
        font-size: 32px;
        font-weight: bold;
        color: #52525c;
        width: fit-content;
        letter-spacing: 2px;
        background-color: #f7fafc;
        margin-top: 8px;
      }
      .footer {
        color: #000000;
        font-size: 16px;
        margin-top: 40px;
      }
      .footer-email {
        color: #000000;
        text-decoration: none;
      }
      .footer-email:hover {
        text-decoration: underline;
      }
      .bottom-bar {
        max-width: 540px;
        min-height: 24px;
        align-content: center;
        margin-left: auto;
        margin-right: auto;
        background-color: #2d77b1;
        color: #ffffff;
        padding: 16px;
        font-size: 10px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img
          src="https://i.imgur.com/afpoGXp_d.webp?maxwidth=760&fidelity=grand"
          alt="Ilustração de renovação"
          width="200"
        />
      </div>
      <div class="title">Esqueci a senha</div>
      <div class="content">
        <p>Olá {{name}},</p>
        <p>
          Esqueceu a senha? Não se preocupe! Utilize o
          <a href="#">código</a> abaixo na plataforma para redefinir sua senha:
        </p>
      </div>
      <div class="code-box">{{code}}</div>
      <div class="footer">
        <p>
          Dúvidas? Estamos aqui para ajudar:
          <a class="footer-email" href="mailto:suporte@agilizaprevi.com"
            >suporte@agilizaprevi.com</a
          >
        </p>
        <p>Equipe AgilizaPrevi.</p>
      </div>
    </div>
    <div class="bottom-bar">
      © 2025 AgilizaPrevi. Todos os direitos reservados
    </div>
  </body>
</html>
